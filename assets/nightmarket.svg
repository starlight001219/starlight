<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" data-hidden="V2hhdCBpcyB0aGUgZm9ydGhzZWNvbmQgbGV0dGVyPw==">
  <defs>
